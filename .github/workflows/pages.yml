name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: emo/frontend/package-lock.json

      - name: Build frontend
        working-directory: emo/frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          REACT_APP_BACKEND_URL: https://xroxx-emo-online-api.hf.space
        run: |
          npm ci --legacy-peer-deps || npm install
          npm run build
          cp build/index.html build/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: emo/frontend/build

      - id: deployment
        uses: actions/deploy-pages@v4
