name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_URL: https://xeroxytb.com
  # Apres deploy Koyeb: GitHub > Settings > Variables > EMO_API_URL = https://xxx.koyeb.app
  BACKEND_URL: ${{ vars.EMO_API_URL || 'https://xroxx-emo-online-api.hf.space' }}
  BACKEND_FALLBACK_URL: https://xroxx-emo-online-api.hf.space

jobs:
  deploy-backend:
    name: Backend (Hugging Face)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN absent"
            exit 0
          fi
          rm -rf /tmp/hf-push && mkdir -p /tmp/hf-push
          rsync -a --exclude='.git' --exclude='login_test_artifacts' --exclude='scripts/login_test_output' \
            --exclude='node_modules' --exclude='emo/frontend/node_modules' --exclude='emo/frontend/build' \
            ./ /tmp/hf-push/
          cd /tmp/hf-push
          git init -b main
          git config user.email "emo@users.noreply.github.com"
          git config user.name "Emo Online"
          git add -A
          git commit -m "Deploy Emo API $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git remote add space "https://Xroxx:${HF_TOKEN}@huggingface.co/spaces/Xroxx/emo-online-api"
          git push space main --force

  deploy-pages:
    name: Frontend (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: emo/frontend/package-lock.json

      - name: Build React app
        working-directory: emo/frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          REACT_APP_BACKEND_URL: ${{ env.BACKEND_URL }}
          REACT_APP_BACKEND_FALLBACK_URL: ${{ env.BACKEND_FALLBACK_URL }}
        run: |
          npm ci --legacy-peer-deps || npm install
          npm run build
          cp build/index.html build/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: emo/frontend/build

      - id: deployment
        uses: actions/deploy-pages@v4
