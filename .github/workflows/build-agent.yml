name: Build Emo Agent

on:
  push:
    branches: [main]
    paths:
      - "emo/agent-go/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build Windows agents
        working-directory: emo/agent-go
        run: |
          go mod tidy
          mkdir -p ../backend/agent_binaries
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-s -w -X main.version=2.4.0 -X main.defaultBackend=https://xroxx-emo-online-api.hf.space" \
            -H windowsgui -o ../backend/agent_binaries/emo-agent-windows-amd64.exe .
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags "-s -w -X main.version=2.4.0 -X main.defaultBackend=https://xroxx-emo-online-api.hf.space" \
            -H windowsgui -o ../backend/agent_binaries/emo-agent-windows-arm64.exe .
          ls -la ../backend/agent_binaries/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emo-agent-windows
          path: |
            emo/backend/agent_binaries/emo-agent-windows-amd64.exe
            emo/backend/agent_binaries/emo-agent-windows-arm64.exe
          retention-days: 30
