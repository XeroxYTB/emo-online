name: Free 24/7 Hosting

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch:

env:
  # Hugging Face Spaces — gratuit, sans carte bancaire
  API_URL: ${{ vars.EMO_API_URL || 'https://xroxx-emo-online-api.hf.space' }}

jobs:
  keepalive:
    name: Keep API awake
    runs-on: ubuntu-latest
    steps:
      - name: Ping API (single request, no spam)
        run: |
          URL="${{ env.API_URL }}"
          code=$(curl -s -o /tmp/ping.json -w "%{http_code}" --max-time 90 "${URL}/api/ping" || echo "000")
          echo "Ping ${URL} → HTTP ${code}"
          if [ "$code" = "200" ]; then
            cat /tmp/ping.json
            exit 0
          fi
          echo "::notice::API pas pret (cold start HF ou 429). Attends 30-60s et reessaie."

  sync-hf-on-demand:
    name: Redeploy HF backup
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install huggingface_hub python-dotenv
      - name: Push clean tree to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then echo "HF_TOKEN absent"; exit 0; fi
          python scripts/push-hf-clean.py
