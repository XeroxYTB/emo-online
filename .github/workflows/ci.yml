name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emo/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import server; print('server import OK')"

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build Emo Agent (all platforms)
        working-directory: emo/agent-go
        run: |
          chmod +x build.sh
          ./build.sh
      - name: Verify binaries
        run: |
          ls -la emo/backend/agent_binaries/
          test -f emo/backend/agent_binaries/emo-agent-linux-amd64
          test -f emo/backend/agent_binaries/emo-agent-windows-amd64.exe

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emo/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: emo/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps || npm install
      - run: CI=false DISABLE_ESLINT_PLUGIN=true REACT_APP_BACKEND_URL= npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, agent]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: emo-online:ci
          build-args: |
            REACT_APP_BACKEND_URL=
