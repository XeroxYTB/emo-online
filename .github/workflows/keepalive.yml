name: API Keepalive

on:
  schedule:
    - cron: "*/4 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Hugging Face API
        run: |
          URL="${{ vars.EMO_API_URL || 'https://xroxx-emo-online-api.hf.space' }}"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/api/ping" || echo "000")
            echo "Attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 8
          done
          echo "::warning::API ping failed after 3 attempts (may be cold-starting)"
          exit 0
