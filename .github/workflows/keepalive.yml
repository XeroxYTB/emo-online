name: API Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Hugging Face API
        run: |
          URL="${{ vars.EMO_API_URL || 'https://emo-online-xeroxytb.fly.dev' }}"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 "${URL}/api/ping" || echo "000")
          echo "Ping → HTTP $code"
          if [ "$code" = "200" ]; then exit 0; fi
          echo "::warning::API ping returned $code (HF may be rate-limited or cold-starting)"
          exit 0
